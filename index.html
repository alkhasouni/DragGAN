<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arabic Carousel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <span class="header-icon">🎠</span>
        <h1>Arabic Carousel</h1>
      </div>
      <div class="header-right">
        <span id="limitWarning" class="limit-badge" hidden>Max 7 slides reached</span>
        <span class="slide-badge">
          Slides&nbsp;<strong id="slideCount">4</strong>&nbsp;/&nbsp;7
        </span>
      </div>
    </header>

    <!-- Carousel -->
    <section class="carousel-section">
      <div class="carousel-viewport" id="carouselViewport">
        <div class="carousel-track" id="carouselTrack"></div>
        <button class="nav-btn nav-prev" id="prevBtn" aria-label="Previous slide">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15,18 9,12 15,6"></polyline>
          </svg>
        </button>
        <button class="nav-btn nav-next" id="nextBtn" aria-label="Next slide">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="9,18 15,12 9,6"></polyline>
          </svg>
        </button>
      </div>
      <div class="dots-row" id="dotsRow" role="tablist" aria-label="Slide navigation"></div>
    </section>

    <!-- Chat -->
    <section class="chat-section">
      <div class="chat-feed" id="chatFeed"></div>

      <div class="chat-composer">
        <div class="media-previews" id="mediaPreviews"></div>
        <div class="composer-row">
          <textarea
            id="chatInput"
            class="composer-input"
            placeholder="Paste or type text to translate to Arabic…"
            rows="1"
            aria-label="Message input"
          ></textarea>
          <label class="icon-btn" title="Add image or video">
            <input type="file" id="mediaFile" accept="image/*,video/*" multiple hidden>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21,15 16,10 5,21"></polyline>
            </svg>
          </label>
          <button id="sendBtn" class="send-btn" aria-label="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22,2 15,22 11,13 2,9"></polygon>
            </svg>
          </button>
        </div>
        <p class="composer-hints">
          <span>⏎ Send</span>
          <span>⇧⏎ New line</span>
          <span>📋 Paste to auto-translate</span>
          <span>🖼️ Attach image / video</span>
        </p>
      </div>
    </section>

  </div>
  <script src="app.js"></script>
</body>
</html>
